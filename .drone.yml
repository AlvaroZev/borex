---
kind: pipeline
type: docker
name: alexg5-ci-cd

trigger:
  branch:
    - ci-cd
  event:
    - push
    - custom

concurrency:
  limit: 1

steps:
  - name: dry-run
    image: python:3.11-slim-bookworm
    commands:
      - apt-get update && apt-get install -y --no-install-recommends gcc libpq-dev && rm -rf /var/lib/apt/lists/*
      - pip install --no-cache-dir -r requirements.txt -r deploy/requirements-ci.txt
      - export BOREX_MAIN_ROOT=$$PWD
      - cd deploy/borex_live
      - python mt5service.py --dry-run --strategy alexg5 --leverage 5000 --rr-factor 2.5 --tick-once --no-ui

  - name: build
    image: plugins/docker
    settings:
      repo:
        from_secret: docker_repo
      tags:
        - ci-cd
        - latest
        - ${DRONE_COMMIT_SHA:0:8}
      dockerfile: deploy/Dockerfile
      context: .
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      status:
        - success

  - name: deploy
    image: appleboy/drone-ssh
    environment:
      DEPLOY_PATH:
        from_secret: deploy_path
      DOCKER_REPO:
        from_secret: docker_repo
    settings:
      host:
        from_secret: deploy_host
      username:
        from_secret: deploy_user
      key:
        from_secret: deploy_ssh_key
      port:
        from_secret: deploy_port
      envs:
        - DEPLOY_PATH
        - DOCKER_REPO
      script:
        - |
          set -e
          cd "${DEPLOY_PATH}"
          git fetch origin ci-cd
          git checkout ci-cd
          git pull --ff-only origin ci-cd
          export BOREX_DOCKER_REPO="${DOCKER_REPO}"
          export BOREX_DOCKER_TAG=ci-cd
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -File deploy/scripts/restart-live.ps1
          elif command -v powershell >/dev/null 2>&1; then
            powershell -File deploy/scripts/restart-live.ps1
          else
            echo "No PowerShell on deploy host — run deploy/scripts/restart-live.ps1 manually"
            exit 1
          fi
    when:
      status:
        - success
      branch:
        - ci-cd

---
kind: secret
name: docker_repo
get:
  path: borex/docker
  name: repo

---
kind: secret
name: docker_username
get:
  path: borex/docker
  name: username

---
kind: secret
name: docker_password
get:
  path: borex/docker
  name: password

---
kind: secret
name: deploy_host
get:
  path: borex/deploy
  name: host

---
kind: secret
name: deploy_user
get:
  path: borex/deploy
  name: user

---
kind: secret
name: deploy_ssh_key
get:
  path: borex/deploy
  name: ssh_key

---
kind: secret
name: deploy_port
get:
  path: borex/deploy
  name: port

---
kind: secret
name: deploy_path
get:
  path: borex/deploy
  name: path
